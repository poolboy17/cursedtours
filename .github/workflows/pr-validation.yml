name: PR Validation Gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - 'astro.config.*'
      - 'tsconfig.json'
      - '.github/workflows/pr-validation.yml'

jobs:
  validate:
    name: Content & Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Lint check
        run: npx eslint src/ --max-warnings 50
        continue-on-error: true

      - name: Astro & TypeScript checks
        run: npx astro check

      - name: Article validation
        run: npm run test:articles

      - name: Tour & affiliate validation
        run: npm run test:tours

      - name: Build site
        run: npm run build

      - name: Build output validation
        run: npm run test:build

      - name: Hub audit
        run: npm run test:hubs

      - name: Upload fix report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-errors
          path: |
            tests/fix-report.json
            dist/
          retention-days: 7
