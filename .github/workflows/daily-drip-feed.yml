# Daily Drip-Feed — triggers Netlify rebuild at 06:00 UTC (midnight CST)
#
# getAllArticles() date-gates articles: only date <= today get built.
# This daily rebuild makes the next article go live automatically.
#
# SETUP:
# 1. Netlify Dashboard → Site → Build & Deploy → Build Hooks
#    Create hook named "daily-drip-feed"
#    Copy the URL
# 2. GitHub → Repo Settings → Secrets → Actions
#    Add secret: NETLIFY_BUILD_HOOK = <the URL>

name: Daily Drip Feed

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC = midnight CST
  workflow_dispatch:       # Manual trigger

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify Build
        run: |
          echo "Triggering drip-feed rebuild at $(date -u)"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}")
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
            echo "Deploy triggered (HTTP $RESPONSE)"
          else
            echo "Deploy failed (HTTP $RESPONSE)"
            exit 1
          fi
