[build]
  command = "npm run build"
  publish = "dist"

# Image optimization
[images]
  remote_images = ["https://wp\\.cursedtours\\.com/.*", "https://i0\\.wp\\.com/.*", "https://media-cdn\\.tripadvisor\\.com/.*", "https://images\\.unsplash\\.com/.*"]

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/.netlify/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Vary = "Accept"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://o4508247438655488.ingest.us.sentry.io; worker-src 'self' blob:;"

# WP category pages → city hubs (301 passes link equity)
[[redirects]]
  from = "/category/salem/"
  to = "/salem-ghost-tours/"
  status = 301
  force = true

[[redirects]]
  from = "/category/charleston/"
  to = "/charleston-ghost-tours/"
