  status = 301
  force = true

[[redirects]]
  from = "/chicago-architecture-and-ghost-tour/"
  to = "/chicago-ghost-tours/"
  status = 301
  force = true

[[redirects]]
  from = "/ghosts-of-chicago-family-friendly-ghost-tour/"
  to = "/chicago-ghost-tours/"
  status = 301
  force = true

# Old WP utility pages
[[redirects]]
  from = "/affiliate-disclosure/"
  to = "/editorial-policy/"
  status = 301
  force = true

[[redirects]]
  from = "/cookie-policy/"
  to = "/privacy-policy/"
  status = 301
  force = true

[[redirects]]
  from = "/tours/"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/tours/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/terms-of-service/"
  to = "/terms/"
  status = 301
  force = true

[[redirects]]
  from = "/contact-us/"
  to = "/contact/"
  status = 301
  force = true

# Catch-all 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
